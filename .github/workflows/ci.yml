name: CI - Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 23
        uses: actions/setup-java@v3
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: backend

      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: backend

      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build & Push BE image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_URL }}/moneysnap-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.12.0'

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build React
        run: npm run build
        working-directory: frontend

      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build & Push FE image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_URL }}/moneysnap-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Backend to Container App
        uses: azure/cli@v1
        with:
          inlineScript: |
            az containerapp update \
              --name moneysnap-backend \
              --resource-group moneysnap-rg \
              --image ${{ secrets.AZURE_REGISTRY_URL }}/moneysnap-backend:latest \
              --set-env-vars \
                SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
                SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
                SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}"

      - name: Deploy Frontend to Container App
        uses: azure/cli@v1
        with:
          inlineScript: |
            if az containerapp show --name moneysnap-frontend --resource-group moneysnap-rg &>/dev/null; then
              az containerapp update \
                --name moneysnap-frontend \
                --resource-group moneysnap-rg \
                --image ${{ secrets.AZURE_REGISTRY_URL }}/moneysnap-frontend:latest
            else
              az containerapp create \
                --name moneysnap-frontend \
                --resource-group moneysnap-rg \
                --environment moneysnap-env \
                --image ${{ secrets.AZURE_REGISTRY_URL }}/moneysnap-frontend:latest \
                --target-port 80 \
                --ingress external \
                --registry-server ${{ secrets.AZURE_REGISTRY_URL }} \
                --registry-username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
                --registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }}
            fi